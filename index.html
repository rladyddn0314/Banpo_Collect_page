
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>동의서 징구 홈페이지</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* 왼쪽 탭 영역 */
        .left-tabs {
            width: 430px;
            background-color: #222;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .tab-button {
            width: 100%;
            padding: 15px 14px;
            border: none;
            border-radius: 8px;
            background-color: #444;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            line-height: 1.4;
        }

        .tab-button:hover {
            background-color: #666;
        }

        .tab-button.active {
            background-color: #d71920;
        }

        /* 탭 사이 화살표 */
        .tab-arrow {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin: 7px 0;
            line-height: 1;
        }

        /* 오른쪽 기본 내용 영역 */
        .right-content {
            flex: 1;
            position: relative;
            color: white;
            font-size: 38px;
            font-weight: bold;
            text-align: center;
            padding: 40px;
            overflow: hidden;
        }

        .center-text {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-page-title {
            position: absolute;
            top: 24px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 34px;
            font-weight: bold;
            line-height: 1.35;
            color: inherit;
            z-index: 10;
            pointer-events: none;
        }

        .color-1 {
            background-color: black;
        }

        .color-2 {
            background-color: green;
        }

        .color-3 {
            background-color: purple;
        }

        .color-4 {
            background-color: white;
            color: black;
        }

        .color-5 {
            background-color: white;
            color: black;
        }

        .color-6 {
            background-color: white;
            color: black;
        }

        .color-7 {
            background-color: #d71920;
        }

        /* 4번 탭: 동의서 다운받기 */
        .consent-download-page {
            width: 100%;
            height: 100%;
            background-color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 25px;
        }

        /* 이미지와 버튼을 세로로 묶는 박스 */
        .consent-paper-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            max-height: 100%;
        }

        /* 동의서 이미지 */
        .consent-preview {
            display: block;
            max-width: 90%;
            max-height: calc(100vh - 150px);
            object-fit: contain;

            box-shadow: 0 0 18px rgba(0, 0, 0, 0.25);
            border: 1px solid #ddd;
            background-color: white;
        }

        /* 버튼 줄 */
        .consent-button-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;

            margin-top: 14px;
        }

        /* 버튼 */
        .bottom-button {
            padding: 13px 24px;
            border: none;
            border-radius: 8px;
            background-color: #d71920;
            color: white;

            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .bottom-button:hover {
            background-color: #b9141a;
        }

        /* 5번 탭: 동의서 작성 예시 */
        .example-page {
            width: 100%;
            height: 100%;
            background-color: white;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 45px;

            padding: 30px;
            color: black;
        }

        .example-left-label {
            width: 140px;
            min-width: 140px;
            text-align: center;
            font-size: 52px;
            font-weight: bold;
            color: #d71920;
        }

        .example-image-column {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .example-image-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .example-preview {
            display: block;
            max-height: calc(100vh - 170px);
            max-width: 100%;
            object-fit: contain;

            box-shadow: 0 0 18px rgba(0, 0, 0, 0.25);
            border: 1px solid #ddd;
            background-color: white;
        }

        .example-notice {
            width: 620px;
            min-width: 620px;
            text-align: left;
            color: black;
            font-weight: bold;
        }

        .example-notice-title {
            font-size: 34px;
            color: #d71920;
            margin-bottom: 24px;
        }

        .example-notice-list {
            font-size: 22px;
            line-height: 1.9;
            padding-left: 0;
            white-space: nowrap;
        }

        /* 6번 탭: 동의서 및 신분증 사진 제출하기 */
        .submit-page {
            width: 100%;
            height: 100%;
            background-color: white;
            color: black;

            display: flex;
            align-items: flex-start;
            justify-content: center;

            padding: 70px 40px;
        }

        .submit-form-box {
            width: 760px;
            text-align: left;
            font-size: 24px;
            font-weight: bold;
        }

        .submit-row {
            display: grid;
            grid-template-columns: 260px 1fr;
            align-items: center;
            gap: 18px;

            margin-bottom: 24px;
        }

        .submit-input {
            width: 100%;
            height: 44px;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;

            font-size: 20px;
        }

        .submit-textarea {
            width: 100%;
            height: 86px;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;

            font-size: 20px;
            font-family: Arial, sans-serif;
            resize: vertical;
        }

        .submit-action-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: nowrap;
        }

        .submit-help-text {
            font-size: 16px;
            font-weight: bold;
            color: black;
            white-space: nowrap;
        }

        .file-input-hidden {
            display: none;
        }

        .upload-button {
            display: inline-block;
            width: 130px;
            padding: 12px 0;
            border: none;
            border-radius: 8px;
            background-color: #d71920;
            color: white;

            font-size: 18px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
        }

        .upload-button:hover {
            background-color: #b9141a;
        }

        .upload-control-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: nowrap;
        }

        .upload-status-text {
            font-size: 17px;
            font-weight: bold;
            color: black;
            line-height: 1.4;
            word-break: keep-all;
            white-space: nowrap;
        }

        .submit-button {
            width: 150px;
            padding: 12px 0;
            border: none;
            border-radius: 8px;
            background-color: #d71920;
            color: white;

            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-button:disabled {
            background-color: #bdbdbd;
            color: #ffffff;
            cursor: not-allowed;
        }

        .submit-button:disabled:hover {
            background-color: #bdbdbd;
        }

        .submit-button:hover {
            background-color: #b9141a;
        }


        /* 왼쪽 탭 하단: 실시간 동의 현황 */
        .consent-stats-box {
            width: 100%;
            margin-top: auto;
            padding: 16px 14px;
            border: 2px solid #d71920;
            border-radius: 10px;
            background-color: #ffffff;
            color: #111111;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.8;
            text-align: left;
        }

        .consent-stats-line {
            white-space: nowrap;
        }

        #printFrame {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- 왼쪽 탭 -->
        <div class="left-tabs">

            <button class="tab-button active" onclick="changeTab(1)">
                1. 구역 개요
            </button>

            <div class="tab-arrow">↓</div>

            <button class="tab-button" onclick="changeTab(2)">
                2. 현재 상황
            </button>

            <div class="tab-arrow">↓</div>

            <button class="tab-button" onclick="changeTab(3)">
                3. 목표 동의율 및 목표 기한
            </button>

            <div class="tab-arrow">↓</div>

            <button class="tab-button" onclick="changeTab(4)">
                4. 동의서 다운받기
            </button>

            <div class="tab-arrow">↓</div>

            <button class="tab-button" onclick="changeTab(5)">
                5. 동의서 손글씨로 작성하고 사진 찍기
            </button>

            <div class="tab-arrow">↓</div>

            <button class="tab-button" onclick="changeTab(6)">
                6. 동의서 및 신분증 사진 제출하기
            </button>

            <div class="tab-arrow">↓</div>

            <button class="tab-button" onclick="changeTab(7)">
                완료, 감사합니다!
            </button>

            <div class="consent-stats-box">
                <div class="consent-stats-line">
                    현재 동의자 수 : <span id="currentConsentCount">불러오는 중</span>
                </div>
                <div class="consent-stats-line">
                    동의율 : <span id="currentConsentRate">불러오는 중</span>
                </div>
            </div>


        </div>
        <!-- 오른쪽 내용 -->
        <div id="rightContent" class="right-content color-1">
            <div class="tab-page-title">1. 구역 개요</div>
            <div class="center-text">1. 구역 개요</div>
        </div>

    </div>

    <iframe id="printFrame"></iframe>

    <script>
        const PDF_FILE = "assets/동의서 양식.pdf";
        const PREVIEW_IMAGE = "assets/consent_form_preview.png";
        const EXAMPLE_PDF_FILE = "assets/동의서 예시.pdf";
        const EXAMPLE_IMAGE = "assets/consent_example_preview.png";

        /*
            아래 주소를 Google Apps Script 배포 후 발급되는 웹 앱 URL로 교체하세요.
            예시: https://script.google.com/macros/s/AKfycbxxxxxxxxxxxxxxxx/exec
        */
        const GOOGLE_APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxnzsJ10SxE-4_5WDw4XiSiVqOjRLlsuGkvBB8sVS9aneps1NpP9fyYwoNqWPtTMMC5/exec";
        const CONSENT_TOTAL_COUNT = 1196;


        function updateConsentStatsBox(consentCount) {
            const currentConsentCount = document.getElementById("currentConsentCount");
            const currentConsentRate = document.getElementById("currentConsentRate");

            if (!currentConsentCount || !currentConsentRate) {
                return;
            }

            if (consentCount === null || consentCount === undefined || consentCount === "") {
                currentConsentCount.textContent = "확인 불가";
                currentConsentRate.textContent = "확인 불가";
                return;
            }

            const countNumber = Number(consentCount);

            if (!Number.isFinite(countNumber)) {
                currentConsentCount.textContent = "확인 불가";
                currentConsentRate.textContent = "확인 불가";
                return;
            }

            const consentRate = countNumber * 100 / CONSENT_TOTAL_COUNT;

            currentConsentCount.textContent = String(countNumber);
            currentConsentRate.textContent = consentRate.toFixed(2) + "%";
        }

        function loadConsentStatsFromGoogleSheet() {
            const callbackName = "handleConsentStats_" + Date.now();
            const script = document.createElement("script");

            window[callbackName] = function (data) {
                try {
                    if (data && data.success === true) {
                        updateConsentStatsBox(data.highestUniqueNumber);
                    } else {
                        updateConsentStatsBox(null);
                    }
                } finally {
                    delete window[callbackName];
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                }
            };

            script.onerror = function () {
                updateConsentStatsBox(null);
                delete window[callbackName];
                if (script.parentNode) {
                    script.parentNode.removeChild(script);
                }
            };

            script.src = GOOGLE_APPS_SCRIPT_WEB_APP_URL
                + "?callback=" + encodeURIComponent(callbackName)
                + "&t=" + Date.now();

            document.body.appendChild(script);
        }

        window.addEventListener("load", function () {
            loadConsentStatsFromGoogleSheet();
            setInterval(loadConsentStatsFromGoogleSheet, 10000);
        });

        function changeTab(tabNumber) {
            const rightContent = document.getElementById("rightContent");
            const buttons = document.querySelectorAll(".tab-button");

            buttons.forEach(button => {
                button.classList.remove("active");
            });

            rightContent.className = "right-content";

            if (tabNumber === 1) {
                buttons[0].classList.add("active");
                rightContent.classList.add("color-1");
                rightContent.innerHTML = '<div class="tab-page-title">1. 구역 개요</div><div class="center-text">1. 구역 개요</div>';
            }

            if (tabNumber === 2) {
                buttons[1].classList.add("active");
                rightContent.classList.add("color-2");
                rightContent.innerHTML = '<div class="tab-page-title">2. 현재 상황</div><div class="center-text">2. 현재 상황</div>';
            }

            if (tabNumber === 3) {
                buttons[2].classList.add("active");
                rightContent.classList.add("color-3");
                rightContent.innerHTML = '<div class="tab-page-title">3. 목표 동의율 및 목표 기한</div><div class="center-text">3. 목표 동의율 및 목표 기한</div>';
            }

            if (tabNumber === 4) {
                buttons[3].classList.add("active");
                rightContent.classList.add("color-4");

                rightContent.innerHTML = `
                    <div class="tab-page-title">4. 동의서 다운받기</div>

                    <div class="consent-download-page">

                        <div class="consent-paper-wrap">

                            <img class="consent-preview"
                                 src="${PREVIEW_IMAGE}"
                                 alt="동의서 양식 미리보기">

                            <div class="consent-button-row">

                                <a class="bottom-button"
                                   href="${PDF_FILE}"
                                   download="동의서 양식.pdf">
                                    다운받기
                                </a>

                                <button class="bottom-button"
                                        onclick="printPDF()">
                                    바로 인쇄하기
                                </button>

                            </div>

                        </div>

                    </div>
                `;
            }

            if (tabNumber === 5) {
                buttons[4].classList.add("active");
                rightContent.classList.add("color-5");

                rightContent.innerHTML = `
                    <div class="tab-page-title">5. 동의서 손글씨로 작성하고 사진 찍기</div>

                    <div class="example-page">

                        <div class="example-left-label">예시</div>

                        <div class="example-image-column">

                            <div class="example-image-wrap">
                                <img class="example-preview"
                                     src="${EXAMPLE_IMAGE}"
                                     alt="동의서 작성 예시">
                            </div>

                            <div class="consent-button-row">

                                <button class="bottom-button"
                                        onclick="downloadExamplePDF()">
                                    다운받기
                                </button>

                                <button class="bottom-button"
                                        onclick="printExamplePDF()">
                                    바로 인쇄하기
                                </button>

                            </div>

                        </div>

                        <div class="example-notice">
                            <div class="example-notice-title">
                                주의사항!
                            </div>

                            <div class="example-notice-list">
                                1. 빨간색 글씨 부분만 작성해주세요<br>
                                2. 파란색 글씨는 설명용 문구입니다<br>
                                3. 자필 서명은 정자로 해주세요<br>
                                4. 지장 날인도 잊지말고 해주세요 (인감도장 안됩니다!)<br>
                                5. 글씨가 작아서 안보일 시 다운받아서 확인해주세요
                            </div>
                        </div>

                    </div>
                `;
            }

            if (tabNumber === 6) {
                buttons[5].classList.add("active");
                rightContent.classList.add("color-6");

                rightContent.innerHTML = `
                    <div class="tab-page-title">6. 동의서 및 신분증 사진 제출하기</div>

                    <div class="submit-page">

                        <div class="submit-form-box">

                            <div class="submit-row">
                                <label for="ownerName">1. 소유자 성명</label>
                                <input id="ownerName"
                                       class="submit-input"
                                       type="text"
                                       placeholder="예) 홍길동">
                            </div>

                            <div class="submit-row">
                                <label for="landNumber">2. 소유 토지의 지번</label>
                                <input id="landNumber"
                                       class="submit-input"
                                       type="text"
                                       placeholder="예) 반포동 714-26">
                            </div>

                            <div class="submit-row">
                                <label for="unitNumber">3. 소유 물건의 동 호수</label>
                                <input id="unitNumber"
                                       class="submit-input"
                                       type="text"
                                       placeholder="예) 없다면 공란, 있다면 00동 00호 양식으로.">
                            </div>

                            <div class="submit-row">
                                <label for="ownerPhone">4. 소유자 전화번호</label>
                                <input id="ownerPhone"
                                       class="submit-input"
                                       type="text"
                                       inputmode="numeric"
                                       pattern="[0-9]*"
                                       placeholder="예) 01011112222 ( - 없이 부탁드립니다)">
                            </div>

                            <div class="submit-row">
                                <span>5. 동의서 업로드</span>
                                <div class="upload-control-row">
                                    <input id="consentUpload"
                                           class="file-input-hidden"
                                           type="file">
                                    <label class="upload-button"
                                           for="consentUpload">
                                        업로드
                                    </label>
                                    <span id="consentUploadStatus"
                                          class="upload-status-text"></span>
                                </div>
                            </div>

                            <div class="submit-row">
                                <span>6. 신분증 업로드</span>
                                <div class="upload-control-row">
                                    <input id="idUpload"
                                           class="file-input-hidden"
                                           type="file">
                                    <label class="upload-button"
                                           for="idUpload">
                                        업로드
                                    </label>
                                    <span id="idUploadStatus"
                                          class="upload-status-text"></span>
                                </div>
                            </div>

                            <div class="submit-row">
                                <label for="ownerMessage">7. 하고 싶으신 말씀</label>
                                <textarea id="ownerMessage"
                                          class="submit-textarea"
                                          maxlength="50"
                                          placeholder="자유롭게 적어주세요(최대 50글자)"></textarea>
                            </div>

                            <div class="submit-row">
                                <span>8. 전체 제출</span>
                                <div class="submit-action-row">
                                    <button id="submitAllButton"
                                            class="submit-button"
                                            type="button"
                                            disabled>
                                        전체 제출
                                    </button>
                                    <span class="submit-help-text">위 항목을 모두 입력해야 버튼이 활성화됩니다</span>
                                </div>
                            </div>

                        </div>

                    </div>
                `;

                setupSubmitPageValidation();
            }

            if (tabNumber === 7) {
                buttons[6].classList.add("active");
                rightContent.classList.add("color-7");
                rightContent.innerHTML = '<div class="tab-page-title">완료, 감사합니다!</div><div class="center-text">완료, 감사합니다!</div>';
            }
        }

        function setupSubmitPageValidation() {
            const ownerName = document.getElementById("ownerName");
            const landNumber = document.getElementById("landNumber");
            const unitNumber = document.getElementById("unitNumber");
            const ownerPhone = document.getElementById("ownerPhone");
            const ownerMessage = document.getElementById("ownerMessage");
            const consentUpload = document.getElementById("consentUpload");
            const idUpload = document.getElementById("idUpload");
            const consentUploadStatus = document.getElementById("consentUploadStatus");
            const idUploadStatus = document.getElementById("idUploadStatus");
            const submitAllButton = document.getElementById("submitAllButton");

            function updateSubmitButtonState() {
                const allTextFilled =
                    ownerName.value.trim() !== "" &&
                    landNumber.value.trim() !== "" &&
                    unitNumber.value.trim() !== "" &&
                    ownerPhone.value.trim() !== "" &&
                    ownerMessage.value.trim() !== "";

                const allFilesUploaded =
                    consentUpload.files.length > 0 &&
                    idUpload.files.length > 0;

                submitAllButton.disabled = !(allTextFilled && allFilesUploaded);
            }

            function updateUploadStatus(fileInput, statusElement) {
                if (fileInput.files.length > 0) {
                    const fileName = fileInput.files[0].name;
                    statusElement.textContent = fileName + " 파일의 업로드가 완료되었습니다.";
                } else {
                    statusElement.textContent = "";
                }

                updateSubmitButtonState();
            }

            function allowOnlyNumberInput(inputElement) {
                inputElement.addEventListener("beforeinput", function (event) {
                    if (event.data && /[^0-9]/.test(event.data)) {
                        event.preventDefault();
                    }
                });

                inputElement.addEventListener("paste", function (event) {
                    const pastedText = (event.clipboardData || window.clipboardData).getData("text");

                    if (/[^0-9]/.test(pastedText)) {
                        event.preventDefault();
                    }
                });

                inputElement.addEventListener("drop", function (event) {
                    event.preventDefault();
                });

                inputElement.addEventListener("input", function () {
                    inputElement.value = inputElement.value.replace(/[^0-9]/g, "");
                    updateSubmitButtonState();
                });
            }

            allowOnlyNumberInput(ownerPhone);

            ownerName.addEventListener("input", updateSubmitButtonState);
            landNumber.addEventListener("input", updateSubmitButtonState);
            unitNumber.addEventListener("input", updateSubmitButtonState);
            ownerPhone.addEventListener("input", updateSubmitButtonState);
            ownerMessage.addEventListener("input", updateSubmitButtonState);

            consentUpload.addEventListener("change", function () {
                updateUploadStatus(consentUpload, consentUploadStatus);
            });

            idUpload.addEventListener("change", function () {
                updateUploadStatus(idUpload, idUploadStatus);
            });

            submitAllButton.addEventListener("click", submitAllDataToGoogle);

            updateSubmitButtonState();
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = function () {
                    const result = reader.result;
                    const base64Data = String(result).split(",")[1];

                    resolve({
                        fileName: file.name,
                        mimeType: file.type || "application/octet-stream",
                        base64Data: base64Data
                    });
                };

                reader.onerror = function () {
                    reject(new Error("파일을 읽는 중 오류가 발생했습니다."));
                };

                reader.readAsDataURL(file);
            });
        }

        function checkDuplicateSubmission(ownerNameValue, ownerPhoneValue) {
            return new Promise((resolve) => {
                const callbackName = "handleDuplicateCheck_" + Date.now();
                const script = document.createElement("script");

                window[callbackName] = function (data) {
                    try {
                        resolve(data);
                    } finally {
                        delete window[callbackName];
                        if (script.parentNode) {
                            script.parentNode.removeChild(script);
                        }
                    }
                };

                script.onerror = function () {
                    resolve({
                        success: false,
                        duplicateExists: false
                    });
                    delete window[callbackName];
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                };

                script.src = GOOGLE_APPS_SCRIPT_WEB_APP_URL
                    + "?callback=" + encodeURIComponent(callbackName)
                    + "&action=checkDuplicate"
                    + "&ownerName=" + encodeURIComponent(ownerNameValue)
                    + "&ownerPhone=" + encodeURIComponent(ownerPhoneValue)
                    + "&t=" + Date.now();

                document.body.appendChild(script);
            });
        }

        function getCurrentHighestUniqueNumberForSubmit() {
            return new Promise((resolve) => {
                const callbackName = "handleSubmitNumberCheck_" + Date.now();
                const script = document.createElement("script");

                window[callbackName] = function (data) {
                    try {
                        if (data && data.success === true) {
                            resolve(Number(data.highestUniqueNumber || 0));
                        } else {
                            resolve(null);
                        }
                    } finally {
                        delete window[callbackName];
                        if (script.parentNode) {
                            script.parentNode.removeChild(script);
                        }
                    }
                };

                script.onerror = function () {
                    resolve(null);
                    delete window[callbackName];
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                };

                script.src = GOOGLE_APPS_SCRIPT_WEB_APP_URL
                    + "?callback=" + encodeURIComponent(callbackName)
                    + "&t=" + Date.now();

                document.body.appendChild(script);
            });
        }

        async function submitAllDataToGoogle() {
            const ownerName = document.getElementById("ownerName");
            const landNumber = document.getElementById("landNumber");
            const unitNumber = document.getElementById("unitNumber");
            const ownerPhone = document.getElementById("ownerPhone");
            const ownerMessage = document.getElementById("ownerMessage");
            const consentUpload = document.getElementById("consentUpload");
            const idUpload = document.getElementById("idUpload");
            const submitAllButton = document.getElementById("submitAllButton");

            if (GOOGLE_APPS_SCRIPT_WEB_APP_URL === "여기에_구글_앱스_스크립트_웹앱_URL을_붙여넣으세요") {
                alert("Google Apps Script 웹 앱 URL을 먼저 코드에 입력해야 합니다.");
                return;
            }

            try {
                submitAllButton.disabled = true;
                submitAllButton.textContent = "제출 중...";

                const ownerNameValue = ownerName.value.trim();
                const ownerPhoneValue = ownerPhone.value.trim();

                const duplicateCheckResult = await checkDuplicateSubmission(ownerNameValue, ownerPhoneValue);

                let updateExisting = false;
                let existingUniqueNumber = "";
                let existingRowNumber = "";
                let newSubmitNumber = "";

                if (duplicateCheckResult && duplicateCheckResult.success === true && duplicateCheckResult.duplicateExists === true) {
                    const confirmUpdate = confirm("이전에 제출된 내역이 있습니다. 현재의 내용으로 갱신하시겠습니까?");

                    if (!confirmUpdate) {
                        submitAllButton.disabled = false;
                        submitAllButton.textContent = "전체 제출";
                        return;
                    }

                    updateExisting = true;
                    existingUniqueNumber = duplicateCheckResult.uniqueNumber || "";
                    existingRowNumber = duplicateCheckResult.rowNumber || "";
                } else {
                    const currentHighestUniqueNumber = await getCurrentHighestUniqueNumberForSubmit();

                    if (currentHighestUniqueNumber === null) {
                        alert("고유번호 확인 중 오류가 발생했습니다. 다시 시도해 주세요.");
                        submitAllButton.disabled = false;
                        submitAllButton.textContent = "전체 제출";
                        return;
                    }

                    newSubmitNumber = currentHighestUniqueNumber + 1;
                }

                const consentFileData = await fileToBase64(consentUpload.files[0]);
                const idFileData = await fileToBase64(idUpload.files[0]);

                const payload = {
                    action: "submitConsent",
                    updateExisting: updateExisting,
                    existingUniqueNumber: existingUniqueNumber,
                    existingRowNumber: existingRowNumber,
                    ownerName: ownerNameValue,
                    landNumber: landNumber.value.trim(),
                    unitNumber: unitNumber.value.trim(),
                    ownerPhone: "'" + ownerPhoneValue,
                    ownerMessage: ownerMessage.value.trim(),
                    consentFile: consentFileData,
                    idFile: idFileData
                };

                await fetch(GOOGLE_APPS_SCRIPT_WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8"
                    },
                    body: JSON.stringify(payload)
                });

                if (updateExisting) {
                    alert("갱신이 처리되었습니다.");
                } else {
                    alert(String(newSubmitNumber) + "번째 동의자이십니다. 감사합니다.");
                }

                changeTab(7);

            } catch (error) {
                alert("제출 중 오류가 발생했습니다. 다시 시도해 주세요.");
                submitAllButton.disabled = false;
                submitAllButton.textContent = "전체 제출";
            }
        }
